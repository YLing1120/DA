<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DA 學習平台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f0e0c;--paper:#f5f2ec;--cream:#ede9e0;
  --accent:#c84b2f;--blue:#2a5f8f;--green:#3a7d52;
  --gold:#b8902a;--muted:#7a7068;--border:#d4cfc4;
  --card:#faf8f4;--mono:'IBM Plex Mono',monospace;
  --sans:'Noto Sans TC',sans-serif;
}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.7}
button{cursor:pointer;font-family:var(--sans)}
input,select,textarea{font-family:var(--sans)}
/* NAV */
nav{position:sticky;top:0;z-index:100;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;border-bottom:2px solid var(--accent)}
.nav-brand{font-family:var(--mono);font-size:13px;color:var(--paper);display:flex;align-items:center;gap:8px}
.nav-brand span{color:var(--accent)}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:0 14px;height:52px;display:flex;align-items:center;font-size:12px;color:#a09888;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;letter-spacing:.05em;font-family:var(--mono);transition:all .2s}
.nav-tab:hover{color:var(--paper)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* LAYOUT */
.wrap{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
.page-title{font-size:1.8rem;margin-bottom:6px;font-weight:400}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:2rem}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:14px}
.card h3{font-size:15px;font-weight:500;margin-bottom:10px}
.card h4{font-size:13px;font-weight:500;color:var(--blue);margin:12px 0 6px}
.card p{font-size:14px;color:#4a4540;line-height:1.75;margin-bottom:8px}
.card p:last-child{margin-bottom:0}
.card ul{padding-left:16px;font-size:14px;color:#4a4540;line-height:1.8}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.nav-tab{padding:0 10px;font-size:11px}}
/* HIGHLIGHT BOXES */
.hl{background:#edf3fa;border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:12px 16px;margin:10px 0;font-size:14px;color:#1a3a5c;line-height:1.75}
.warn{background:#fef8ec;border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:12px 16px;margin:10px 0;font-size:14px;color:#5a4010;line-height:1.75}
.ok{background:#e8f5ee;border-left:3px solid var(--green);border-radius:0 6px 6px 0;padding:12px 16px;margin:10px 0;font-size:14px;color:#1a4a2a;line-height:1.75}
/* SUB TABS */
.sub-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.2rem}
.sub-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;background:var(--card);font-size:12px;color:var(--muted);transition:all .15s}
.sub-btn:hover{border-color:var(--blue);color:var(--blue)}
.sub-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
/* SIGNAL ROWS */
.signal-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;align-items:flex-start}
.signal-row:last-child{border-bottom:none}
.signal-label{font-weight:500;margin-bottom:2px;color:var(--ink);flex-shrink:0;min-width:80px}
.signal-desc{color:#4a4540;line-height:1.65;font-size:13px}
/* CODE BLOCK */
.code-block{background:#f8f6f1;border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin:12px 0;overflow-x:auto}
.code-block pre{font-family:var(--mono);font-size:13px;line-height:1.8;color:#2a2520;margin:0}
.c-cm{color:#7a8f6a}.c-kw{color:#7c3aed}.c-st{color:#166534}.c-nu{color:#c2410c}.c-fn{color:#1d4ed8}.c-cp{color:#92400e}
/* FORMULA BOX */
.formula{background:#f0f4f8;border:1.5px solid #bfdbfe;border-radius:8px;padding:13px 16px;margin:10px 0;font-family:var(--mono);font-size:13px;color:#1e3a5f;line-height:1.8}
/* NOTES */
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.notes-grid{grid-template-columns:1fr}}
.note-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:14px;position:relative}
.note-card.fixed{border-left:3px solid var(--blue)}
.note-title{font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink)}
.note-body{font-size:13px;color:#4a4540;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.note-body img{max-width:100%;border-radius:6px;margin:6px 0;display:block}
.note-meta{font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--mono)}
.note-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px}
.icon-btn{background:none;border:none;color:var(--muted);font-size:14px;padding:3px 5px;border-radius:4px}
.icon-btn:hover{color:var(--ink);background:var(--cream)}
.cat-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-bottom:8px;font-family:var(--mono)}
.cat-flow{background:#edf3fa;color:#1a3a5c}
.cat-select{background:#e8f5ee;color:#1a4a2a}
.cat-entry{background:#fef8ec;color:#5a4010}
.cat-chipread{background:var(--cream);color:var(--muted)}
.cat-exit{background:#fdecea;color:#5a1a10}
.cat-special{background:var(--cream);color:var(--muted)}
.cat-other{background:var(--cream);color:var(--muted)}
/* FILTER */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-btn{padding:5px 12px;border:1.5px solid var(--border);border-radius:14px;background:none;font-size:12px;color:var(--muted)}
.filter-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--paper);border-radius:12px;padding:1.5rem;width:100%;max-width:480px;border:1px solid var(--border)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:1rem}
.field{margin-bottom:12px}
.field label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;background:var(--card);color:var(--ink)}
.field textarea{min-height:140px;resize:vertical;line-height:1.7}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn{padding:8px 18px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;background:none;color:var(--muted)}
.btn-primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
/* TRACKER */
.prog-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.8rem}
@media(max-width:640px){.prog-grid{grid-template-columns:repeat(3,1fr)}}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.prog-num{font-size:1.4rem;font-weight:500;font-family:var(--mono);color:var(--ink)}
.prog-label{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
.goal-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.goal-item:last-child{border-bottom:none}
.goal-check{font-size:16px;color:var(--muted);flex-shrink:0;margin-top:1px}
.goal-check.done{color:var(--green)}
.goal-title{font-size:14px;font-weight:500;color:var(--ink)}
.goal-item.done .goal-title{text-decoration:line-through;color:var(--muted)}
.goal-sub{font-size:12px;color:var(--muted)}
.tl-row{display:flex;gap:12px;padding:8px 0;position:relative}
.tl-row:not(:last-child)::after{content:'';position:absolute;left:7px;top:22px;width:2px;height:calc(100% - 8px);background:var(--border)}
.tl-dot{width:16px;height:16px;border-radius:50%;background:var(--border);border:2px solid var(--border);flex-shrink:0;margin-top:3px}
.tl-dot.active{background:var(--blue);border-color:var(--blue)}
.tl-title{font-size:14px;font-weight:500;margin-bottom:2px}
.tl-desc{font-size:12px;color:var(--muted)}
/* CERT */
.cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.cert-grid{grid-template-columns:1fr}}
.cert-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.cert-card.high{border-color:#bfdbfe}
.cert-card.acquired{border-color:var(--green);background:#f0fdf4}
.cert-header{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px 10px;gap:8px}
.cert-badge{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:4px}
.cert-name{font-size:14px;font-weight:500;margin-bottom:2px}
.cert-issuer{font-size:12px;color:var(--muted)}
.cert-check-btn{padding:5px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:var(--card);color:var(--muted);white-space:nowrap;flex-shrink:0}
.cert-check-btn.acquired{background:var(--green);color:#fff;border-color:var(--green)}
.cert-body{padding:0 16px 14px;font-size:13px;color:#4a4540;line-height:1.7}
.cert-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.cert-meta span{font-size:11px;background:var(--cream);padding:2px 8px;border-radius:4px;color:var(--muted)}
/* PROJECT */
.proj-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.proj-card.doing{border-color:#fbbf24}
.proj-card.done{border-color:var(--green)}
.proj-header{display:flex;align-items:center;gap:12px;padding:14px 16px}
.proj-num{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--border);flex-shrink:0}
.proj-title{font-size:14px;font-weight:500;margin-bottom:2px}
.proj-desc{font-size:12px;color:var(--muted)}
.proj-status{padding:5px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:var(--card)}
.proj-steps{padding:0 16px 14px;display:flex;flex-direction:column;gap:4px}
.ps-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#4a4540;padding:3px 0}
.ps-item.done{text-decoration:line-through;color:var(--muted)}
.ps-check{color:var(--muted);font-size:14px;flex-shrink:0}
.ps-item.done .ps-check{color:var(--green)}
/* SKILL */
.skill-group-title{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:1.2rem 0 10px;display:flex;align-items:center;gap:8px}
.skill-group-title::after{content:'';flex:1;height:1px;background:var(--border)}
.skill-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.skill-row:last-child{border-bottom:none}
.skill-name{font-size:14px;flex:1}
.stars{display:flex;gap:4px}
.star{font-size:18px;color:var(--border);cursor:pointer;transition:color .1s}
.star.lit{color:var(--gold)}
.skill-pct{font-family:var(--mono);font-size:12px;color:var(--muted);width:36px;text-align:right}
/* LOG */
.log-entry{display:flex;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;font-size:14px}
.log-date{font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0;margin-top:2px}
.log-del{color:var(--muted);cursor:pointer;flex-shrink:0}
/* FINANCE */
.f-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.f-table th{background:var(--cream);padding:8px 12px;text-align:left;font-size:12px;font-weight:500;color:var(--muted)}
.f-table td{padding:8px 12px;border-bottom:1px solid var(--border);line-height:1.6;vertical-align:top}
.f-table tr:last-child td{border-bottom:none}
/* QUIZ */
.quiz-area{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-top:1.2rem}
.quiz-q{font-size:14px;font-weight:500;margin-bottom:12px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.quiz-opt{background:var(--paper);border:1.5px solid var(--border);border-radius:6px;padding:10px 14px;font-size:14px;text-align:left;transition:all .15s}
.quiz-opt:hover:not(:disabled){border-color:var(--blue)}
.quiz-opt.correct{background:#e8f5ee;border-color:var(--green);color:#1a4a2a}
.quiz-opt.wrong{background:#fdecea;border-color:var(--accent);color:#5a1a10}
.quiz-feedback{font-size:13px;line-height:1.7;padding:10px 14px;border-radius:6px;margin-bottom:8px}
.quiz-feedback.ok{background:#e8f5ee;color:#1a4a2a}
.quiz-feedback.no{background:#fdecea;color:#5a1a10}
.section-label{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:1.5rem 0 10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
/* STOCK */
.kline-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0}
@media(max-width:640px){.kline-grid{grid-template-columns:repeat(2,1fr)}}
.kline-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.kline-icon{font-size:24px;margin-bottom:6px}
.kline-name{font-size:12px;font-weight:500;margin-bottom:4px}
.kline-desc{font-size:11px;color:var(--muted);line-height:1.5}
.chip-table{width:100%;border-collapse:collapse;font-size:13px}
.chip-table th{background:var(--cream);padding:8px 12px;text-align:left;font-size:12px;font-weight:500;color:var(--muted)}
.chip-table td{padding:8px 12px;border-bottom:1px solid var(--border);line-height:1.6;vertical-align:top}
/* TAGS */
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:3px;margin:2px;font-family:var(--mono)}
.tag-bull{background:#e8f5ee;color:#1a4a2a}
.tag-bear{background:#fdecea;color:#5a1a10}
.tag-neu{background:#edf3fa;color:#1a3a5c}
/* COMPOUND */
.compound-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.compound-label{width:44px;color:var(--muted);font-family:var(--mono);flex-shrink:0}
.compound-bar-bg{flex:1;background:var(--border);border-radius:3px;height:18px}
.compound-bar-fill{height:100%;border-radius:3px;background:var(--blue);display:flex;align-items:center;padding-left:6px}
.compound-bar-text{font-size:11px;color:#fff;font-family:var(--mono);white-space:nowrap}
/* CUSTOM GOALS */
.custom-goal-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.custom-goal-item:last-child{border-bottom:none}

/* FLOATING NOTE */
.float-btn{position:fixed;bottom:24px;right:24px;z-index:1000;width:50px;height:50px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;transition:transform .2s}
.float-btn:hover{transform:scale(1.08)}
.float-panel{position:fixed;bottom:86px;right:24px;z-index:1000;width:420px;background:var(--paper);border:1.5px solid var(--border);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);display:flex;flex-direction:column;max-height:80vh}
.float-panel-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.float-panel-header span{font-size:13px;font-weight:500;flex:1}
.float-panel-tabs{display:flex;gap:4px}
.fp-tab{padding:3px 10px;border:1px solid var(--border);border-radius:5px;background:none;font-size:11px;cursor:pointer;color:var(--muted)}
.fp-tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.float-panel-body{padding:14px 16px;overflow-y:auto;flex:1}
.fp-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:var(--sans);background:var(--card);color:var(--ink);margin-bottom:8px;box-sizing:border-box}
.fp-input:focus{outline:none;border-color:var(--blue)}
.fp-textarea{width:100%;min-height:240px;padding:10px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--sans);background:var(--card);color:var(--ink);resize:none;line-height:1.7;box-sizing:border-box}
.fp-textarea:focus{outline:none;border-color:var(--blue)}
@media(max-width:500px){.float-panel{width:calc(100vw - 32px)}}
.fp-save-btn{width:100%;margin-top:8px;padding:8px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:var(--sans)}
.fp-saved{font-size:11px;color:var(--green);text-align:center;margin-top:6px;height:14px}
.fp-mini-note{padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.fp-mini-note:hover{border-color:var(--blue)}
.fp-mini-title{font-size:12px;font-weight:500;margin-bottom:2px;color:var(--ink)}
.fp-mini-body{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fp-mini-date{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono)}

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const STRATEGY_NOTES=[
  {id:'s1',cat:'flow',title:'選股到出場：完整流程',body:'① 篩選有機會的股票\n② 確認對的時間（大盤格局）\n③ 等盤中訊號（不急進場）\n④ 足夠資訊才判斷（技術面＋籌碼面 1+1）\n\n核心系統：葛蘭碧多空 ＋ 主力籌碼過濾'},
  {id:'s2',cat:'flow',title:'盤中SOP操作流程',body:'早盤：確認大盤格局（外資期貨 vs 散戶小台）\n12:00：挑選個股名單\n12:30 後：才考慮進場\n\n盤後做功課：\n• 籌碼打勾（盤後警報器）\n• 三種篩選條件跑一遍'},
  {id:'s3',cat:'chipread',title:'大盤格局判斷',body:'外資期貨＋ + 散戶小台－ → 多頭格局\n外資期貨－ + 散戶小台＋ → 空頭格局\n符號相同 → 震盪\n\n短期三指標：\n雙綠一紅 → 偏空\n雙紅一綠 → 偏多\n交雜 → 調節格局'},
  {id:'s4',cat:'select',title:'追漲六心法',body:'1. 集中：籌碼集中在特定人手上\n2. 糾結：5/10/20均線糾結，60不遠\n3. 壓縮：價穩量縮（全紅最好）\n4. 突破：長紅K突破切線/頸線/前高\n5. 帶量：突破帶量，非詭異大量\n6. 實紅：上影線不超過1/2\n\n初學版：突破＋四季五燈獎'},

function QuizSection({topic}){
  const data=QUIZ_DATA[topic]||[];
  const [idx,setIdx]=useState(0);
  const [answered,setAnswered]=useState(false);
  const [chosen,setChosen]=useState(null);
  if(!data.length) return null;
  if(idx>=data.length) return <div className="quiz-area"><p style={{textAlign:'center',color:'var(--muted)'}}>🎉 這個主題的題目都做完了！</p><button className="btn" style={{display:'block',margin:'12px auto 0'}} onClick={()=>{setIdx(0);setAnswered(false);setChosen(null)}}>重新練習</button></div>;
  const item=data[idx];
  const answer=(i)=>{if(answered)return;setAnswered(true);setChosen(i)};
  const next=()=>{setIdx(i=>i+1);setAnswered(false);setChosen(null)};
  return <div className="quiz-area">
    <div className="quiz-q">Q{idx+1}/{data.length}　{item.q}</div>
    <div className="quiz-opts">
      {item.opts.map((o,i)=><button key={i} disabled={answered} className={`quiz-opt${answered&&i===item.ans?' correct':''}${answered&&chosen===i&&i!==item.ans?' wrong':''}`} onClick={()=>answer(i)}>{o}</button>)}
    </div>
    {answered&&<div className={`quiz-feedback ${chosen===item.ans?'ok':'no'}`}>{chosen===item.ans?'✅ ':'❌ '}{item.exp}</div>}
    {answered&&<button className="btn btn-primary" onClick={next}>下一題 →</button>}
  </div>
}

function PandasLesson(){return <>
  <Card><h3>DataFrame 是什麼？</h3><p>把它想成「超強版 Excel 試算表」——每一欄是一個欄位，每一列是一筆資料。DataFrame 是多欄多列；Series 是單一欄位（一維）。</p>
  <Hl>認識數據三步驟：<br/>1. <code>df.shape</code> — 幾列幾欄？<br/>2. <code>df.info()</code> — 每欄的型態？有沒有缺失值？<br/>3. <code>df.describe()</code> — 數值欄的平均、最大、最小</Hl></Card>
  <Card><h3>篩選資料</h3>
  <div className="code-block"><pre>{`# 篩選單一條件
df[df['satisfaction'] >= 4]

# 多條件（用 & 和 |，每個條件要加括號）
df[(df['satisfaction'] >= 4) & (df['channel'] == '電話')]

# 在清單內
df[df['issue_type'].isin(['退款申請', '產品瑕疵'])]`}</pre></div>
  <Warn>⚠️ 多條件一定要用括號包住每個條件，而且用 & 不是 and</Warn></Card>
  <Card><h3>groupby 分組計算</h3><p>把資料按某欄分組再計算，就像 Excel 的樞紐分析表。</p>
  <div className="code-block"><pre>{`# 各問題類型的平均滿意度
df.groupby('issue_type')['satisfaction'].mean()

# 同時算多個統計量
df.groupby('issue_type')['satisfaction'].agg(['mean','count','std'])

# 多欄位分組
df.groupby(['issue_type','channel'])['satisfaction'].mean()`}</pre></div></Card>
  <Card><h3>處理缺失值</h3>
  <div className="code-block"><pre>{`df.isnull().sum()          # 各欄缺失數量
df.isnull().mean() * 100   # 各欄缺失比例 %

df.dropna()                # 刪除有缺失的列
df['col'].fillna(df['col'].median(), inplace=True)  # 填補中位數`}</pre></div>
  <Warn>⚠️ 用平均值填補會讓數據看起來比實際上更整齊，重要分析要說明你怎麼處理缺失值的</Warn></Card>
  <Card><h3>常見錯誤</h3>
  <div className="code-block"><pre>{`# ❌ SettingWithCopyWarning
high_sat = df[df['satisfaction'] >= 4]
high_sat['label'] = 'good'  # 警告！

# ✅ 正確：用 .copy()
high_sat = df[df['satisfaction'] >= 4].copy()
high_sat['label'] = 'good'

# ✅ 或用 .loc
df.loc[df['satisfaction'] >= 4, 'label'] = 'good'`}</pre></div></Card>
  <SectionLabel>小測驗</SectionLabel>
  <QuizSection topic="pandas"/>
</>}

function EDALesson(){return <>
  <Card><h3>EDA 是什麼？</h3><p>探索性資料分析（Exploratory Data Analysis）是分析的第一步：在建模前先「看懂」你的數據。目標不是找答案，而是了解數據的特徵和問題。</p></Card>
  <div className="grid2">
    <Card><h4>1. 分布</h4><p>每個欄位的值長什麼樣子？是否偏態？有異常值？</p><p style={{color:'var(--muted)',fontSize:'13px'}}>工具：直方圖、箱型圖、df.describe()</p></Card>
    <Card><h4>2. 缺失值</h4><p>哪些欄位有空值？缺失是隨機還是有規律？</p><p style={{color:'var(--muted)',fontSize:'13px'}}>工具：df.isnull().sum()、df.isnull().mean()</p></Card>
    <Card><h4>3. 相關性</h4><p>兩個數值欄位之間有關聯嗎？</p><p style={{color:'var(--muted)',fontSize:'13px'}}>工具：df.corr()、散點圖、熱力圖</p></Card>
    <Card><h4>4. 類別分布</h4><p>文字欄有哪些類別？各類別的比例？</p><p style={{color:'var(--muted)',fontSize:'13px'}}>工具：value_counts()、長條圖</p></Card>
  </div>
  <Card><h3>EDA 五步驟框架</h3>
  <Hl>第一步：我有什麼？ → shape、info、describe、缺失值<br/>第二步：每個欄位長什麼樣？ → 數值畫直方圖，類別用 value_counts<br/>第三步：欄位之間有什麼關係？ → 相關係數、groupby 交叉分析<br/>第四步：有沒有異常？ → IQR 法則、重複資料<br/>第五步：我想問什麼問題？ → 把發現轉成可驗證的假設</Hl></Card>
  <Card><h3>IQR 異常值偵測</h3>
  <div className="code-block"><pre>{`Q1 = df['resolution_time'].quantile(0.25)
Q3 = df['resolution_time'].quantile(0.75)
IQR = Q3 - Q1

outliers = df[(df['resolution_time'] < Q1 - 1.5*IQR) | 
              (df['resolution_time'] > Q3 + 1.5*IQR)]
print(f'異常值：{len(outliers)} 筆')`}</pre></div></Card>
  <Card><h3>三個常見陷阱</h3>
  <Warn>⚠️ 相關 ≠ 因果：處理時間長 → 滿意度低，不代表「長導致低」，可能是第三個變數（問題複雜度）在影響兩者</Warn>
  <Warn>⚠️ 右偏數據用中位數：幾個極端值會大幅拉高平均值，中位數比平均值更能代表典型情況</Warn>
  <Warn>⚠️ 樣本太少不可信：某個分組只有 3 筆資料，算出的「平均滿意度 5.0」毫無意義。分析前先確認每組至少 20~30 筆</Warn></Card>
</>}

function StatsLesson(){return <>
  <Card><h3>p-value 白話解釋</h3><p>p-value 回答的是：「如果兩組本來就沒差，卻看到這麼大差異的機率有多少？」</p>
  <Hl>用丟硬幣想：<br/>丟10次全正面，機率 = 1/1024 ≈ 0.001<br/>p = 0.001 → 這枚硬幣幾乎不可能是公正的<br/><br/>換成分析：A/B 兩組滿意度差 0.5 分，p = 0.03<br/>→ 這個差異不太可能是隨機的 → 改動有效果</Hl>
  <Warn>⚠️ 三個誤解：<br/>✗ p = 0.03 不是「有 97% 機率差異是真的」<br/>✗ p 小不代表差異很大（可能差 0.01 分但樣本夠大）<br/>✗ p &gt; 0.05 不等於兩組一定沒差</Warn></Card>
  <Card><h3>假設檢定四步驟（用客服案例）</h3>
  <Hl>步驟 1：設定假設<br/>H₀（預設）：新舊流程沒有差異<br/>H₁（你想證明的）：新流程滿意度比較高<br/><br/>步驟 2：設定門檻 → α = 0.05<br/>步驟 3：收集數據，算出 p-value<br/>步驟 4：p &lt; 0.05 → 拒絕 H₀，說「有顯著提升」</Hl></Card>
  <div className="grid2">
    <Card><h4>Type I Error（偽陽性）</h4><p>實際沒差，但你說有差 → 推了一個沒用的改動</p><p style={{fontSize:'13px',color:'var(--muted)'}}>發生機率 = α = 0.05</p><Ok>記憶口訣：「狼來了」（亂報警）</Ok></Card>
    <Card><h4>Type II Error（偽陰性）</h4><p>實際有差，但你說沒差 → 錯過了一個好改動</p><p style={{fontSize:'13px',color:'var(--muted)'}}>與樣本數有關，樣本越多越低</p><Ok>記憶口訣：「真的狼來卻沒發現」</Ok></Card>
  </div>
  <Card><h3>t-test 程式碼</h3>
  <div className="code-block"><pre>{`from scipy import stats
import numpy as np

ctrl = df[df['group'] == 'control']['satisfaction']
trt  = df[df['group'] == 'treatment']['satisfaction']

t_stat, p_val = stats.ttest_ind(ctrl, trt)
print(f't = {t_stat:.3f}, p = {p_val:.4f}')

# Cohen's d（效果量）
d = (trt.mean()-ctrl.mean()) / np.sqrt((ctrl.std()**2+trt.std()**2)/2)
size = '小' if abs(d)<0.2 else ('中' if abs(d)<0.8 else '大')
print(f"Cohen's d = {d:.3f}（{size}效果量）")`}</pre></div></Card>
  <SectionLabel>小測驗</SectionLabel>
  <QuizSection topic="stats"/>
</>}

function SQLLesson(){return <>
  <Card><h3>SQL 執行順序（很重要！）</h3><p>你按 SELECT→FROM→WHERE 順序寫，但資料庫執行的順序是：</p>
  <Formula>FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT</Formula>
  <p>理解這個順序，很多「為什麼不能這樣寫」的問題就解開了。</p></Card>
  <Card><h3>基本語法</h3>
  <div className="code-block"><pre>{`SELECT issue_type, COUNT(*) AS ticket_count,
       AVG(satisfaction) AS avg_sat
FROM   customer_service
WHERE  resolved = 1
GROUP BY issue_type
HAVING COUNT(*) > 10
ORDER BY avg_sat DESC
LIMIT  5;`}</pre></div></Card>
  <Card><h3>WHERE vs HAVING</h3>
  <div className="grid2">
    <div><h4>WHERE</h4><p>分組「前」篩選，不能用聚合函式如 COUNT、AVG</p></div>
    <div><h4>HAVING</h4><p>分組「後」篩選，可以用聚合函式</p></div>
  </div>
  <div className="code-block"><pre>{`-- ✅ 正確
SELECT channel, AVG(satisfaction)
FROM customer_service
WHERE agent_exp >= 2       -- 先篩掉資淺員工
GROUP BY channel
HAVING COUNT(*) > 20;     -- 再篩掉樣本太少的

-- ❌ 錯誤：WHERE 不能用 COUNT
WHERE COUNT(*) > 20        -- 這行會報錯！`}</pre></div></Card>
  <Card><h3>Window Function</h3><p>普通 GROUP BY 會壓縮成一列。Window Function 不壓縮，每列都加上分組計算的結果。面試常考！</p>
  <div className="code-block"><pre>{`-- 每列顯示自己的滿意度 + 該 issue_type 的平均
SELECT ticket_id, issue_type, satisfaction,
  AVG(satisfaction) OVER (PARTITION BY issue_type) AS issue_avg
FROM customer_service;

-- ROW_NUMBER：每組內編號，取每組第一名
SELECT * FROM (
  SELECT *, ROW_NUMBER() OVER 
    (PARTITION BY issue_type ORDER BY satisfaction DESC) AS rn
  FROM customer_service
) t WHERE rn = 1;`}</pre></div></Card>
  <SectionLabel>小測驗</SectionLabel>
  <QuizSection topic="sql"/>
</>}

function ABLesson(){return <>
  <Card><h3>A/B 測試完整流程</h3>
  <div className="signal-row"><div style={{minWidth:80,fontWeight:500,fontSize:14}}>① 定義指標</div><div className="signal-desc">要測量什麼？要在開始前決定，不能看完數據再選</div></div>
  <div className="signal-row"><div style={{minWidth:80,fontWeight:500,fontSize:14}}>② 算樣本數</div><div className="signal-desc">根據 MDE（最小可偵測效果）、α=0.05、power=0.8 計算</div></div>
  <div className="signal-row"><div style={{minWidth:80,fontWeight:500,fontSize:14}}>③ 隨機分組</div><div className="signal-desc">確保控制組和實驗組在開始前沒有系統性差異</div></div>
  <div className="signal-row"><div style={{minWidth:80,fontWeight:500,fontSize:14}}>④ 跑完再看</div><div className="signal-desc">不要中途看結果就停止！這叫「偷看問題」，大幅增加偽陽性</div></div>
  <div className="signal-row"><div style={{minWidth:80,fontWeight:500,fontSize:14}}>⑤ 檢定+效果量</div><div className="signal-desc">t-test 判斷是否顯著，Cohen's d 判斷差異夠不夠大</div></div></Card>
  <Card><h3>樣本數計算</h3>
  <div className="code-block"><pre>{`from statsmodels.stats.power import TTestIndPower

analysis = TTestIndPower()

pooled_std = df['satisfaction'].std()
MDE = 0.3  # 你想偵測的最小差異

n = analysis.solve_power(
    effect_size=MDE/pooled_std,
    alpha=0.05,
    power=0.8,
    alternative='two-sided'
)
print(f'每組至少需要 {int(n)+1} 筆樣本')`}</pre></div>
  <Warn>⚠️ MDE 要在測試前根據業務判斷決定，不能因為「樣本數太多」就把 MDE 調大</Warn></Card>
  <Card><h3>完整分析程式碼</h3>
  <div className="code-block"><pre>{`from scipy import stats
import numpy as np

ctrl = df[df['group']=='control']['satisfaction']
trt  = df[df['group']=='treatment']['satisfaction']

t, p = stats.ttest_ind(ctrl, trt)
print(f't={t:.3f}, p={p:.4f}')
print('✅ 統計顯著' if p < 0.05 else '❌ 未達顯著')

d = (trt.mean()-ctrl.mean()) / np.sqrt((ctrl.std()**2+trt.std()**2)/2)
print(f"Cohen's d = {d:.3f}")`}</pre></div></Card>
</>}

function TechMA(){return <>
  <Card><h3>均線是什麼？</h3><p>均線 = 最近 N 天的平均收盤價。代表「這段時間內買進的人，平均成本是多少」。</p>
  <Formula>MA(N) = (最近N天收盤價加總) ÷ N</Formula>
  <Hl>股價在均線上方 → 持有者都賺錢，支撐強<br/>股價跌破均線 → 持有者開始虧損，容易出現賣壓</Hl></Card>
  <Card><h3>各期均線意義</h3>
  <div className="signal-row"><div className="signal-label">MA5 週線</div><div className="signal-desc">超短線，假訊號多，短線當沖才常用</div></div>
  <div className="signal-row"><div className="signal-label" style={{color:'var(--blue)',fontWeight:600}}>MA20 ⭐月線</div><div className="signal-desc">最重要！多空分水嶺。站上月線才算短期多頭，跌破轉弱</div></div>
  <div className="signal-row"><div className="signal-label">MA60 季線</div><div className="signal-desc">法人最重視的中期均線，季報前後法人以此操作</div></div>
  <div className="signal-row"><div className="signal-label">MA120 半年線</div><div className="signal-desc">中長期趨勢指標，由空翻多是中長多確立</div></div>
  <div className="signal-row"><div className="signal-label">MA240 年線</div><div className="signal-desc">長期牛熊分界，大盤跌破年線要特別謹慎</div></div></Card>
  <div className="grid2">
    <Card><h3>多頭排列</h3><Ok>MA5 &gt; MA10 &gt; MA20 &gt; MA60<br/>趨勢向上，回測均線是加碼機會</Ok></Card>
    <Card><h3>空頭排列</h3><Warn>MA5 &lt; MA10 &lt; MA20 &lt; MA60<br/>趨勢向下，反彈到均線是減碼機會</Warn></Card>
  </div>
  <Card><h3>乖離率（BIAS）</h3>
  <Formula>乖離率(%) = (現價 - 均線值) ÷ 均線值 × 100%</Formula>
  <p><strong>MA20 正常範圍：±4~8%</strong></p>
  <div className="grid2">
    <Hl>正乖離 &gt; +8%：短期超漲<br/>不適合追高，等回測均線</Hl>
    <Warn>負乖離 &lt; -8%：短期超跌<br/>注意反彈，但空頭趨勢中超跌後容易繼續跌</Warn>
  </div></Card>
</>}

    <div className="signal-row"><div style={{minWidth:70,fontWeight:500,fontSize:13}}>看漲吞噬</div><div className="signal-desc">大紅K完全包住前一根黑K，多方一口氣吃掉空方</div></div></div>

  <Hl>RSI &gt; 80：超買，注意回調（體力快耗盡）<br/>RSI 50~80：多頭區間<br/>RSI 20~50：空頭區間<br/>RSI &lt; 20：超賣，注意反彈</Hl>
  <div className="grid2">
    <Warn>頂背離：股價創新高，RSI 沒創新高 → 上漲動能衰退</Warn>

function TechStrategy(){return <>
  <Card><h3>突破策略 vs 回檔策略</h3>
  <p>多頭市場中有兩種主要進場方式，適用的時機不同。搞清楚你現在面對的是哪種機會，勝率會大幅提升。</p>
  <div className="grid2">
    <Ok><strong>突破策略</strong>：在股價突破關鍵壓力位時進場，搭上主升段的力道<br/>特色：順勢、追強、爆發力強<br/>風險：假突破、追高被套</Ok>
    <Hl><strong>回檔策略</strong>：等股票漲完拉回到支撐區時進場，用更好的成本參與行情<br/>特色：逆勢布局、成本低、安全感高<br/>風險：支撐不守、繼續跌</Hl>
  </div></Card>

  <div className="section-label">突破策略</div>
  <Card><h3>什麼樣的突破才有效？</h3>
  <p>不是所有突破都值得追，要同時符合以下條件：</p>
  <div className="signal-row"><div className="signal-label">位置對</div><div className="signal-desc">突破的是「有意義的壓力」：前波高點、下降切線、頸線、整理區間上緣。隨便一根均線不算</div></div>
  <div className="signal-row"><div className="signal-label">K線對</div><div className="signal-desc">長紅K突破，實體要夠長（最好超過前幾根K線的實體長度），上影線不能太長（不超過實體的1/2）</div></div>
  <div className="signal-row"><div className="signal-label">量能對</div><div className="signal-desc">突破當天成交量要明顯放大（至少是近5日平均量的1.5倍以上），量越大越可信</div></div>
  <div className="signal-row"><div className="signal-label">籌碼對</div><div className="signal-desc">法人同步買超、籌碼集中，主力在推。純散戶追的突破容易假</div></div>
  <Warn>⚠️ 詭異大量 = 假突破警訊。突破當天量爆大但隔天立刻回跌，代表有人在出貨，不能追</Warn></Card>

  <Card><h3>假突破怎麼辨別？</h3>
  <div className="signal-row"><div className="signal-label">當天收盤</div><div className="signal-desc">真突破：收盤要站在壓力之上。如果盤中突破但尾盤拉回，收盤跌回壓力下方 → 假突破</div></div>
  <div className="signal-row"><div className="signal-label">隔日表現</div><div className="signal-desc">真突破：隔日即使小幅回檔，也不會跌破突破點。若隔天直接跌破 → 假突破，出場</div></div>
  <div className="signal-row"><div className="signal-label">量能持續</div><div className="signal-desc">真突破：之後幾天量能雖然縮小但維持，股價不急跌。假突破：量立刻萎縮、股價軟掉</div></div>
  <Ok>記憶口訣：「真突破站穩，假突破回頭」。長紅突破隔日如果跌破那根長紅K的低點，確認失敗，立刻出場</Ok></Card>

  <Card><h3>突破後的操作流程</h3>
  <div className="signal-row"><div style={{minWidth:60,fontWeight:500,fontSize:13,fontFamily:'var(--mono)'}}>進場</div><div className="signal-desc">突破確認（量價配合）→ 收盤前進場，或隔日開盤小幅回檔量縮時進場（不追高）</div></div>
  <div className="signal-row"><div style={{minWidth:60,fontWeight:500,fontSize:13,fontFamily:'var(--mono)'}}>停損</div><div className="signal-desc">突破K棒的低點。跌破代表突破失敗，一定要出場，不要凹單</div></div>
  <div className="signal-row"><div style={{minWidth:60,fontWeight:500,fontSize:13,fontFamily:'var(--mono)'}}>停利</div><div className="signal-desc">移動停利（每次創高後調整）或關鍵K棒停利。不要設死的目標價，讓強勢股跑</div></div>
  <Hl>突破後的「第一次回測突破點」是加碼機會，不是出場點。回測不破 = 突破確立，這時候加碼成本最好</Hl></Card>

  <div className="section-label">回檔策略</div>
  <Card><h3>回檔策略的核心邏輯</h3>
  <p>股票漲了一段之後，會出現正常的「喘息回檔」。這不是趨勢反轉，而是短線獲利了結。回檔到支撐後，如果出現止跌訊號，就是低風險進場機會。</p>
  <Hl>核心判斷：這次回檔是「正常整理」還是「趨勢反轉」？<br/>正常整理：量縮、跌到支撐止穩<br/>趨勢反轉：放量下跌、跌破重要均線或支撐</Hl></Card>

  <Card><h3>什麼是有效的支撐？</h3>
  <p>支撐要「夠強」才值得依賴，以下幾種最可靠：</p>
  <div className="signal-row"><div className="signal-label">上揚均線</div><div className="signal-desc">MA20、MA60 等均線必須向上傾斜才算支撐。均線走平或向下，支撐力道弱很多</div></div>
  <div className="signal-row"><div className="signal-label">前波高點</div><div className="signal-desc">突破之前的壓力，回測時變支撐（壓力支撐互換原則）。是最可靠的支撐之一</div></div>
  <div className="signal-row"><div className="signal-label">跳空缺口</div><div className="signal-desc">強勢股跳空留下的缺口，回測缺口上緣是支撐。缺口通常第一次不會被補</div></div>
  <div className="signal-row"><div className="signal-label">頸線</div><div className="signal-desc">突破頭肩底或W底的頸線後，回測頸線是支撐。籌碼型態完整，力道強</div></div>
  <div className="signal-row"><div className="signal-label">趨勢線</div><div className="signal-desc">連接波段低點的上升趨勢線，回測時是買點</div></div>
  <Ok>雙重支撐 = 同時符合兩種以上支撐 → 勝率大幅提升。例：前波高點剛好也是 MA20 的位置</Ok></Card>

  <Card><h3>止跌確認訊號</h3>
  <p>跌到支撐還不夠，要等「確認止跌」的K線訊號才進場，不要搶先：</p>
  <div className="signal-row"><div className="signal-label">長下影線</div><div className="signal-desc">盤中跌破支撐但尾盤被拉回，留長下影線。代表下方有強力買盤，是最強的止跌訊號</div></div>
  <div className="signal-row"><div className="signal-label">短紅K</div><div className="signal-desc">在支撐附近收紅，代表多方守住。量要縮（代表賣壓消化完），不要求大紅</div></div>
  <div className="signal-row"><div className="signal-label">量縮止跌</div><div className="signal-desc">回檔過程中量持續萎縮，到支撐附近量縮到極致然後停止下跌。「量縮價穩」是主力惜售的訊號</div></div>
  <Warn>⚠️ 不要在回檔途中接飛刀：股票正在跌、還沒到支撐、沒有止跌訊號，這時候進場是賭，不是策略</Warn></Card>

  <Card><h3>回檔策略的操作流程</h3>
  <div className="signal-row"><div style={{minWidth:60,fontWeight:500,fontSize:13,fontFamily:'var(--mono)'}}>篩選</div><div className="signal-desc">先找多頭排列的個股（均線向上排列、籌碼法人持續買超），這些才值得等回檔買</div></div>
  <div className="signal-row"><div style={{minWidth:60,fontWeight:500,fontSize:13,fontFamily:'var(--mono)'}}>等待</div><div className="signal-desc">畫出支撐區（前波高點、均線位置），設定好「到這裡才看」，不要每天盯著</div></div>
  <div className="signal-row"><div style={{minWidth:60,fontWeight:500,fontSize:13,fontFamily:'var(--mono)'}}>確認</div><div className="signal-desc">等止跌確認訊號出現（長下影線或短紅K），量縮更好。隔日確認沒有繼續跌再進場</div></div>
  <div className="signal-row"><div style={{minWidth:60,fontWeight:500,fontSize:13,fontFamily:'var(--mono)'}}>停損</div><div className="signal-desc">支撐下方。支撐被明顯跌破（不是盤中觸及，是收盤跌破）代表結構壞掉，出場</div></div>
  <Hl>回檔策略的優點：成本比追突破低、停損空間小。缺點：需要耐心等，有時候等不到（股票直接飛走）</Hl></Card>

  <div className="section-label">搭配大盤格局使用</div>
  <Card><h3>什麼時候用突破策略？什麼時候用回檔策略？</h3>
  <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
    <thead><tr>{['大盤格局','適合策略','原因'].map(h=><th key={h} style={{background:'var(--cream)',padding:'8px 12px',textAlign:'left',fontSize:12,fontWeight:500,color:'var(--muted)'}}>{h}</th>)}</tr></thead>
    <tbody>
      {[
        ['強多頭（外資期貨多 + 散戶小台空）','突破策略為主','市場動能強，追突破不容易假突破，強勢股往往一路噴'],
        ['弱多頭 / 震盪偏多','回檔策略為主','追突破容易被倒貨，等回檔有較好的成本和安全邊際'],
        ['震盪格局（訊號交雜）','兩種都謹慎','不確定性高，部位要小，嚴格停損'],
        ['空頭格局（外資期貨空 + 散戶小台多）','兩種都不做','逆勢操作風險極高，等格局轉換再出手'],
      ].map((r,i)=><tr key={i}>{r.map((cell,j)=><td key={j} style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',lineHeight:1.6,verticalAlign:'top'}}>{cell}</td>)}</tr>)}
    </tbody>
  </table>
  <Ok style={{marginTop:10}}>你的盤中SOP流程就是在做這件事：先看大盤格局，再決定用哪種策略找進場點</Ok></Card>
</>}

// ── 策略筆記 (Notes) ──
function NotesPage({userNotes, onSave}){
  const [filter,setFilter]=useState('all');
  const [modal,setModal]=useState(null);
  const exportNotes=()=>{
    const data={userNotes,exportDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='da_notes_backup.json';
    a.click();
  };
  const importNotes=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        const imported=data.userNotes||[];
        if(!Array.isArray(imported))throw new Error();
        if(!confirm('匯入 '+imported.length+' 則筆記？（會合併到現有筆記）'))return;
        const merged=[...imported,...userNotes.filter(n=>!imported.find(i=>i.id===n.id))];
        save(merged);
        alert('✅ 匯入成功！');
      }catch{alert('❌ 檔案格式錯誤');}
    };
    reader.readAsText(file);
    e.target.value='';
  };
  const [editingNote,setEditingNote]=useState({title:'',cat:'other',body:''});

  const save=onSave;
  const openAdd=()=>{setEditingNote({title:'',cat:'other',body:''});setModal({mode:'add'})};
  const openEdit=(n)=>{setEditingNote({...n});setModal({mode:'edit',id:n.id})};
  const saveNote=()=>{
    if(!editingNote.body.trim()){alert('請輸入內容');return}
    const now=new Date();
    const date=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
    if(modal.mode==='edit'){
      save(userNotes.map(n=>n.id===modal.id?{...n,...editingNote,date}:n));
    }else{
      save([{id:'u'+Date.now(),...editingNote,date},...userNotes]);
    }
    setModal(null);
  };
  const del=(id)=>{if(confirm('確定刪除？'))save(userNotes.filter(n=>n.id!==id))};

  const allCats=['all','flow','select','entry','chipread','exit','special','other'];
  const catLabels={all:'全部',...CAT_LABELS};
  const fixedFiltered=filter==='all'?STRATEGY_NOTES:STRATEGY_NOTES.filter(n=>n.cat===filter);
  const userFiltered=filter==='all'?userNotes:userNotes.filter(n=>n.cat===filter);

  // Group fixed notes by category
  const fixedGroups={};
  fixedFiltered.forEach(n=>{if(!fixedGroups[n.cat])fixedGroups[n.cat]=[];fixedGroups[n.cat].push(n)});

  return <div className="wrap">
    <div className="page-title">個人筆記</div>
    <div className="page-sub">股票策略、學習心得、任何想記的都可以</div>
    <div className="filter-bar">
      {allCats.map(cat=><button key={cat} className={`filter-btn${filter===cat?' active':''}`} onClick={()=>setFilter(cat)}>{catLabels[cat]||cat}</button>)}
      <div style={{marginLeft:'auto',display:'flex',gap:6}}>
        <button onClick={exportNotes} style={{padding:'6px 12px',border:'1.5px solid var(--border)',borderRadius:6,fontSize:12,background:'none',color:'var(--muted)'}}>↓ 匯出備份</button>
        <label style={{padding:'6px 12px',border:'1.5px solid var(--border)',borderRadius:6,fontSize:12,background:'none',color:'var(--muted)',cursor:'pointer'}}>↑ 匯入<input type="file" accept=".json" style={{display:'none'}} onChange={importNotes}/></label>
        <button onClick={openAdd} style={{padding:'6px 16px',background:'var(--blue)',color:'#fff',border:'none',borderRadius:6,fontSize:13}}>＋ 新增筆記</button>
      </div>
    </div>
    {Object.entries(fixedGroups).map(([cat,notes])=><div key={cat}>
      <SectionLabel>{CAT_LABELS[cat]||cat}</SectionLabel>
      <div className="notes-grid">{notes.map(n=><div key={n.id} className="note-card fixed">
        <div className="note-title">{n.title}</div>
        <span className={`cat-badge ${CAT_CLASS[n.cat]||'cat-other'}`}>{CAT_LABELS[n.cat]}</span>
        <div className="note-body">{n.body}</div>
      </div>)}</div>
    </div>)}
    {userFiltered.length>0&&<><SectionLabel>我的補充筆記</SectionLabel>
    <div className="notes-grid">{userFiltered.map(n=><div key={n.id} className="note-card">
      <div className="note-actions">
        <button className="icon-btn" onClick={()=>openEdit(n)}>✏️</button>
        <button className="icon-btn" onClick={()=>del(n.id)}>🗑️</button>
      </div>
      <div className="note-title">{n.title||'（無標題）'}</div>
      <span className={`cat-badge ${CAT_CLASS[n.cat]||'cat-other'}`}>{CAT_LABELS[n.cat]||n.cat}</span>
      <div className="note-body">{n.body}</div>
      <div className="note-meta">{n.date}</div>
    </div>)}</div></>}
    {!fixedFiltered.length&&!userFiltered.length&&<div style={{textAlign:'center',padding:'3rem',color:'var(--muted)'}}>這個分類還沒有筆記</div>}

    {modal&&<div className="modal-bg" onClick={e=>{if(e.target.classList.contains('modal-bg'))setModal(null)}}>
      <div className="modal">
        <h3>{modal.mode==='add'?'新增筆記':'編輯筆記'}</h3>

  const [logs,setLogs]=useState(()=>LS.get('da_logs')||[]);
  const [input,setInput]=useState('');
  const add=()=>{if(!input.trim())return;const now=new Date();const date=`${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;const l=[{id:'l'+Date.now(),text:input,date},...logs];setLogs(l);LS.set('da_logs',l);setInput('')};
  const del=(id)=>{const l=logs.filter(x=>x.id!==id);setLogs(l);LS.set('da_logs',l)};
  return <>
    <div style={{display:'flex',gap:8,marginBottom:14}}>
      <input style={{flex:1,padding:'9px 12px',border:'1.5px solid var(--border)',borderRadius:6,fontSize:14,background:'var(--card)'}} placeholder="今天學了什麼？有什麼突破或卡住的地方？" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
      <button className="btn btn-primary" onClick={add}>記錄</button>
    </div>
    {logs.length===0&&<div style={{textAlign:'center',padding:'2rem',color:'var(--muted)',fontSize:14}}>還沒有學習記錄，開始記吧！</div>}
    {logs.map(log=><div key={log.id} className="log-entry">
      <div className="log-date">{log.date}</div>
      <div style={{flex:1}}>{log.text}</div>
      <span className="log-del" onClick={()=>del(log.id)}>×</span>
    </div>)}
  </>
}


// ── Floating Note ──
function FloatingNote({userNotes, onSave}){
  const [open, setOpen] = React.useState(false);
  const [tab, setTab] = React.useState('write');
  const [title, setTitle] = React.useState('');
  const [cat, setCat] = React.useState('other');
  const [body, setBody] = React.useState('');
  const [saved, setSaved] = React.useState('');
  const [editId, setEditId] = React.useState(null);

  const save = () => {
    if(!body.trim()) return;
    const now = new Date();
    const date = now.getMonth()+1+'/'+now.getDate()+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    if(editId){
      onSave(userNotes.map(n=>n.id===editId?{...n,title,cat,body,date}:n));
      setEditId(null);
    } else {
      onSave([{id:'u'+Date.now(),title,cat,body,date},...userNotes]);
    }
    setTitle(''); setBody(''); setSaved('✅ 已儲存');
    setTimeout(()=>setSaved(''), 1600);
  };

  const openEdit = (n) => {
    setTab('write');
    setTitle(n.title||''); setCat(n.cat||'other'); setBody(n.body||'');
    setEditId(n.id);
  };

  const recent = userNotes.slice(0,8);

  const panelStyle={position:'fixed',bottom:86,right:24,zIndex:1000,width:440,background:'#f5f2ec',border:'1.5px solid #d4cfc4',borderRadius:14,boxShadow:'0 8px 32px rgba(0,0,0,.18)',display:'flex',flexDirection:'column',maxHeight:'80vh'};
  const headerStyle={padding:'12px 16px 10px',borderBottom:'1px solid #d4cfc4',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0};
  const bodyStyle={padding:'14px 16px',overflowY:'auto',flex:1};
  const inputStyle={width:'100%',padding:'9px 12px',border:'1.5px solid #d4cfc4',borderRadius:6,fontSize:14,fontFamily:'inherit',background:'#faf8f4',color:'#0f0e0c',marginBottom:8,boxSizing:'border-box',outline:'none'};
  const taStyle={width:'100%',minHeight:380,padding:'10px 12px',border:'1.5px solid #d4cfc4',borderRadius:6,fontSize:14,fontFamily:'inherit',background:'#faf8f4',color:'#0f0e0c',resize:'vertical',lineHeight:1.75,boxSizing:'border-box',outline:'none'};
  const saveBtnStyle={width:'100%',marginTop:8,padding:'10px',background:'#2a5f8f',color:'#fff',border:'none',borderRadius:6,fontSize:14,cursor:'pointer',fontFamily:'inherit'};
  const tabBtnStyle=(active)=>({padding:'4px 10px',border:'1px solid #d4cfc4',borderRadius:5,background:active?'#0f0e0c':'none',color:active?'#fff':'#7a7068',fontSize:11,cursor:'pointer',marginLeft:4});
  const miniNoteStyle={padding:'9px 11px',background:'#faf8f4',border:'1px solid #d4cfc4',borderRadius:6,marginBottom:6,cursor:'pointer'};

  return <>
    <button style={{position:'fixed',bottom:24,right:24,zIndex:1000,width:52,height:52,borderRadius:'50%',background:'#2a5f8f',color:'#fff',border:'none',fontSize:24,cursor:'pointer',boxShadow:'0 4px 16px rgba(0,0,0,.2)',display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setOpen(o=>!o)} title="快速記筆記">📝</button>
    {open && <div style={panelStyle}>
      <div style={headerStyle}>
        <span style={{fontSize:14,fontWeight:500,flex:1}}>📝 快速筆記</span>
        <div>
          <button style={tabBtnStyle(tab==='write')} onClick={()=>setTab('write')}>寫筆記</button>
          <button style={tabBtnStyle(tab==='list')} onClick={()=>setTab('list')}>最近</button>
          <button style={tabBtnStyle(false)} onClick={()=>setOpen(false)}>✕</button>
        </div>
      </div>
      <div style={bodyStyle}>
        {tab==='write' && <>
          <input style={inputStyle} placeholder="標題（選填，Enter 儲存）" value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()}/>
          <select style={inputStyle} value={cat} onChange={e=>setCat(e.target.value)}>
            {[['flow','選股流程'],['select','選股系統'],['entry','進場判斷'],['chipread','籌碼判讀'],['exit','出場規則'],['special','特殊操作'],['other','其他']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
          <textarea style={taStyle} placeholder="想到什麼就寫，支援換行…" value={body} onChange={e=>setBody(e.target.value)}/>
          <button style={saveBtnStyle} onClick={save}>儲存筆記</button>
          <div style={{fontSize:11,color:'#3a7d52',textAlign:'center',marginTop:6,height:14}}>{saved}</div>
        </>}
        {tab==='list' && <>
          {recent.length===0 && <div style={{textAlign:'center',padding:'1.5rem',color:'#7a7068',fontSize:13}}>還沒有筆記</div>}
          {recent.map(n=><div key={n.id} style={miniNoteStyle} onClick={()=>openEdit(n)}>
            <div style={{fontSize:12,fontWeight:500,marginBottom:2}}>{n.title||'（無標題）'}</div>
            <div style={{fontSize:11,color:'#7a7068',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.body}</div>
            <div style={{fontSize:10,color:'#7a7068',marginTop:4,fontFamily:'monospace'}}>{n.date}</div>
          </div>)}
        </>}
      </div>
    </div>}
  </>
}

// ═══════════════════════════════════════════
// APP
// ═══════════════════════════════════════════
const TABS=[{id:'learn',label:'學習筆記'},{id:'stock',label:'股票學習'},{id:'notes',label:'個人筆記'},{id:'finance',label:'財商知識'},{id:'tracker',label:'學習追蹤'}];

function App(){
  const [tab,setTab]=useState(()=>LS.get('da_current_tab')||'learn');
  const [userNotes,setUserNotes]=useState(()=>LS.get('da_user_notes')||[]);
  const saveNotes=(notes)=>{setUserNotes(notes);LS.set('da_user_notes',notes)};
  const switchTab=(id)=>{setTab(id);LS.set('da_current_tab',id)};
  return <>
    <nav>
      <div className="nav-brand"><span>DA</span> · 學習平台</div>
      <div className="nav-tabs">
        {TABS.map(t=><button key={t.id} className={`nav-tab${tab===t.id?' active':''}`} onClick={()=>switchTab(t.id)}>{t.label}</button>)}
      </div>
    </nav>
    {tab==='learn'&&<LearnPage/>}
    {tab==='stock'&&<StockPage/>}
    {tab==='notes'&&<NotesPage userNotes={userNotes} onSave={saveNotes}/>}
    {tab==='finance'&&<FinancePage/>}
    {tab==='tracker'&&<TrackerPage/>}
    <FloatingNote userNotes={userNotes} onSave={saveNotes}/>
  </>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
